<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Quote Card</title>
  </head>
  <body>
    <main class="main">
      <div class="background-img"></div>

    </main>
    <script src="./js/index.js"></script>
  </body>
</html>
